<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Simple Web App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">My Spring Boot App</a>
    </div>
</nav>

<!-- Main Content -->
<main role="main" class="container mt-5">
    <div class="starter-template text-center mt-5">
        <h1 class="display-5 fw-bold text-primary" th:text="${title}">Default Title</h1>
        <p class="lead" th:text="${message}">Default message text goes here.</p>
    </div>
</main>

</body>
</html>
